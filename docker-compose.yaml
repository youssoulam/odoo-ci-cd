version: "3.8"

services:
    odoo:
        build:
            context: .
            dockerfile: odoo/Dockerfile
        container_name: odoo18_ci
        depends_on:
            - db
        ports:
            - "8075:8069"
        volumes:
            - odoo_data:/var/lib/odoo
        environment:
            - HOST=db
            - USER=odoo
            - PASSWORD=odoo
        restart: always

    db:
        image: postgres:15
        container_name: odoo18_ci-db
        ports:
            - "54325:5432"
        volumes:
            - odoo_db_data:/var/lib/postgresql/data
        environment:
            - POSTGRES_USER=odoo
            - POSTGRES_PASSWORD=odoo
            - POSTGRES_DB=postgres
        restart: always

volumes:
    odoo_data:
    odoo_db_data:
